<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>點按翻譯助手</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #526173;
      --line: #d8dee8;
      --accent: #0f766e;
      --bg: #f7fafc;
      --panel: #ffffff;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      line-height: 1.65;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>點按翻譯助手</h1>
      <p>點按翻譯助手提供翻譯、尾碼與剪貼簿輔助功能。Android 版另提供由使用者手動啟動、可見且限時的點按輔助。</p>
      <p><a href="/privacy.html">隱私權政策</a></p>
      <p><a href="/app-ads.txt">app-ads.txt</a></p>
    </section>
  </main>
</body>
</html>
